name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:   # also allow manual trigger from the Actions tab

permissions:
  contents: write   # needed by softprops/action-gh-release

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install zig (via pip wheel - no sudo, fully reproducible)
        run: pip install ziglang

      - name: Compute version tag
        id: ver
        run: |
          TAG="${GITHUB_REF_NAME}"
          # When run via workflow_dispatch there's no tag; fall back to short sha.
          if [ -z "$TAG" ] || [ "$TAG" = "main" ]; then
            TAG="dev-$(git rev-parse --short HEAD)"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Building $TAG"

      - name: Cross-compile both architectures
        run: |
          set -e
          mkdir -p dist

          EXE_SRC="src/main.c src/capture.c src/config.c src/shared_mem.c src/classifier.c src/icon_data.c"
          DLL_SRC="src/hook/hook.c src/hook/inject.c"

          build_pair () {
            local target="$1"         # x86_64-windows-gnu | x86-windows-gnu
            local suffix="$2"         # ""  | _x86
            python3 -m ziglang cc -target "$target" -O2 -Wall \
              -std=c99 -Iinclude -DUNICODE -D_UNICODE \
              $EXE_SRC \
              -lcomctl32 -lshell32 -luser32 -lgdi32 -lole32 \
              -Wl,--subsystem,windows \
              -o "dist/kvmapper${suffix}.exe"
            python3 -m ziglang cc -target "$target" -O2 -Wall -shared \
              -std=c99 -Iinclude -DUNICODE -D_UNICODE \
              $DLL_SRC \
              -luser32 -lkernel32 \
              -o "dist/kvmapper_hook${suffix}.dll"
            cp app.manifest "dist/kvmapper${suffix}.exe.manifest"
          }

          build_pair x86_64-windows-gnu ""
          build_pair x86-windows-gnu    "_x86"

          ls -lh dist/

      - name: Smoke-test the produced PE binaries
        run: python3 tests/verify_dist.py

      - name: Native parser tests (unit + 10k fuzz under ASan/UBSan)
        run: |
          chmod +x tests/native/run.sh
          tests/native/run.sh

      - name: Package per-architecture zips
        id: pkg
        run: |
          set -e
          TAG="${{ steps.ver.outputs.tag }}"
          ZIP_X64="kvmapper-${TAG}-x64.zip"
          ZIP_X86="kvmapper-${TAG}-x86.zip"

          ( cd dist
            zip -j "../${ZIP_X64}" \
              kvmapper.exe kvmapper.exe.manifest kvmapper_hook.dll
            zip -j "../${ZIP_X86}" \
              kvmapper_x86.exe kvmapper_x86.exe.manifest kvmapper_hook_x86.dll
          )

          echo "x64=${ZIP_X64}" >> "$GITHUB_OUTPUT"
          echo "x86=${ZIP_X86}" >> "$GITHUB_OUTPUT"

          # Emit SHA-256 alongside, so users can verify their downloads.
          sha256sum "${ZIP_X64}" "${ZIP_X86}" | tee SHA256SUMS.txt

      - name: Upload build artefacts (always, even on workflow_dispatch)
        uses: actions/upload-artifact@v4
        with:
          name: kvmapper-${{ steps.ver.outputs.tag }}
          path: |
            ${{ steps.pkg.outputs.x64 }}
            ${{ steps.pkg.outputs.x86 }}
            SHA256SUMS.txt
          retention-days: 30

      - name: Create / update GitHub Release (tag push only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            ${{ steps.pkg.outputs.x64 }}
            ${{ steps.pkg.outputs.x86 }}
            SHA256SUMS.txt
