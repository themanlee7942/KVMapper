name: Regression label

# Tags PRs that add or modify a regression archaeology note. Lets the
# maintainers do `label:regression-note-added` searches in the Pull
# Requests view to see every bug we've already catalogued.

on:
  pull_request:
    paths:
      - 'tests/regression/**'

permissions:
  pull-requests: write
  contents: read

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.payload.pull_request.number,
              labels: ['regression-note-added']
            });
